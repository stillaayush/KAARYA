<!DOCTYPE html>
<html lang="en">
<head><link rel="stylesheet" href="style.css"><title>Register | Kaarya</title></head>
<body class="light-theme">
    <div class="container" style="padding-top:100px; display:flex; justify-content:center;">
        <div class="card-3d" style="width:100%; max-width:500px;">
            <h2 style="margin-bottom:20px;">Worker Registration</h2>
            <form onsubmit="location.href='/worker-dashboard'; return false;">
                <input type="text" placeholder="Full Name" style="width:100%; padding:15px; margin-bottom:15px; border-radius:10px; border:1px solid var(--border);">
                <input type="text" placeholder="Aadhaar Number" style="width:100%; padding:15px; margin-bottom:15px; border-radius:10px; border:1px solid var(--border);">
                <button class="btn-3d primary" style="width:100%;">Create Account</button>
            </form>
        </div>
    </div>
</body>
</html>
